<svg xmlns="http://www.w3.org/2000/svg" width="700" height="200" viewBox="0 0 700 200">
  <rect width="700" height="200" fill="#f7fafc"/>
  <text x="20" y="30" font-size="20" font-family="Arial" fill="#1a202c">Monotonic Stack</text>
  <rect x="120" y="60" width="120" height="30" fill="#bee3f8" stroke="#2b6cb0"/>
  <rect x="120" y="90" width="120" height="30" fill="#90cdf4" stroke="#2b6cb0"/>
  <rect x="120" y="120" width="120" height="30" fill="#63b3ed" stroke="#2b6cb0"/>
  <text x="260" y="140" font-size="16" font-family="Arial" fill="#2d3748">push / pop while violating monotonic rule</text>
  <line x1="430" y1="85" x2="520" y2="85" stroke="#2c5282" stroke-width="3" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2c5282"/></marker></defs>
</svg>